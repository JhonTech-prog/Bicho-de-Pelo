# Troque app.seudominio.com pelo dominio real.
# Copie este arquivo para /etc/nginx/sites-available/bicho-de-pelo
# e crie o link em /etc/nginx/sites-enabled/bicho-de-pelo.

server {
    listen 80;
    server_name app.seudominio.com;

    root /var/www/bicho-de-pelo/dist;
    index index.html;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3333/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
